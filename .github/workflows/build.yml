name: Build Flutter APK  
on: [push]  
jobs:  
  build:  
    runs-on: ubuntu-latest  
    steps:  
      - name: Checkout code  
        uses: actions/checkout@v4  
  
      - name: Setup Flutter  
        uses: subosito/flutter-action@v2  
        with:  
          flutter-version: '3.16.9'  
  
      - name: Flutter pub get  
        run: flutter pub get  
  
      - name: Migrate to AndroidX  
        run: |  
          echo "android.useAndroidX=true" >> android/gradle.properties  
          echo "android.enableJetifier=true" >> android/gradle.properties  
  
      - name: Create drawable file  
        run: |  
          mkdir -p android/app/src/main/res/drawable  
          cat > android/app/src/main/res/drawable/launch_background.xml << 'EOF'  
          <?xml version="1.0" encoding="utf-8"?>  
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">  
              <item android:drawable="@android:color/white" />  
          </layer-list>  
          EOF  
  
      - name: Create drawable night file  
        run: |  
          mkdir -p android/app/src/main/res/drawable-night  
          cat > android/app/src/main/res/drawable-night/launch_background.xml << 'EOF'  
          <?xml version="1.0" encoding="utf-8"?>  
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">  
              <item android:drawable="@android:color/black" />  
          </layer-list>  
          EOF  
  
      - name: Build APK  
        run: flutter build apk --release --no-tree-shake-icons  
        env:  
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"  
  
      - name: Upload APK  
        uses: actions/upload-artifact@v4  
        with:  
          name: release-apk  
          path: build/app/outputs/flutter-apk/app-release.apk
